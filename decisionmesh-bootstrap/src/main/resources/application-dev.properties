# ==========================
# OIDC
# ==========================
quarkus.oidc.enabled=true
quarkus.oidc.auth-server-url=http://localhost:8180/realms/decisionmesh
quarkus.oidc.client-id=control-plane-backend
quarkus.oidc.credentials.secret=kKsrU97H21twlzFeuOomgh7bIVdxDWx7
quarkus.oidc.token.issuer=http://localhost:8180/realms/decisionmesh
quarkus.oidc.token.audience=control-plane-backend
quarkus.oidc.application-type=service
quarkus.oidc.jwks.resolve-early=true
quarkus.oidc.tls.verification=none

# Tolerate Keycloak slow start in dev
quarkus.oidc.connection-delay=30S
quarkus.oidc.connection-retry-count=10

# ==========================
# CORS
# ==========================
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=Accept,Authorization,Content-Type,X-Requested-With,Idempotency-Key
quarkus.http.cors.exposed-headers=Location,Info
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.cors.access-control-max-age=24H

# ==========================
# Keycloak Admin
# ==========================
keycloak.auth-server-url=http://localhost:8180
keycloak.realm=decisionmesh
keycloak.admin.username=admin
keycloak.admin.password=admin
keycloak.admin.client-id=control-plane-backend
keycloak.admin.client-secret=kKsrU97H21twlzFeuOomgh7bIVdxDWx7

# ==========================
# Observability
# ==========================
quarkus.otel.enabled=false

quarkus.datasource.jdbc.additional-jdbc-properties.TimeZone=Asia/Kolkata

# ==========================
# OIDC
# ==========================

# Switch between providers without touching code:
app.oidc.issuer-url=${KEYCLOAK_URL:http://localhost:8180}/realms/decisionmesh

# Tomorrow, to switch to Cognito:
# app.oidc.provider=cognito
# app.oidc.issuer-url=https://cognito-idp.us-east-1.amazonaws.com/us-east-1_XXXXX


# ?? LLM Adapter API Keys ??????????????????????????????????????????????????????
# Add these to decisionmesh-bootstrap/src/main/resources/application.properties
# Set actual values via environment variables in your deployment.

llm.openai.api-key=${OPENAI_API_KEY:}
llm.openai.default-model=gpt-4o-mini
llm.openai.default-timeout-ms=30000
llm.openai.gpt-4o.input-cost-per-1k=0.005
llm.openai.gpt-4o.output-cost-per-1k=0.015
llm.openai.gpt-4o-mini.input-cost-per-1k=0.00015
llm.openai.gpt-4o-mini.output-cost-per-1k=0.0006

llm.anthropic.api-key=${ANTHROPIC_API_KEY:}
llm.gemini.api-key=${GEMINI_API_KEY:}
llm.deepseek.api-key=${DEEPSEEK_API_KEY:}
llm.azure.api-key=${AZURE_OPENAI_API_KEY:}
llm.azure.resource-name=${AZURE_OPENAI_RESOURCE_NAME:}

# ?? Adaptive Selector ?????????????????????????????????????????????????????????
llm.selector.epsilon=0.10
llm.selector.strict-mode=false
llm.registry.fail-fast-on-empty=false

# ?? Planner ???????????????????????????????????????????????????????????????????
planner.epsilon=0.10
planner.fallback-enabled=true

# ?? Learning ??????????????????????????????????????????????????????????????????
learning.cache.ttl-hours=24

# ==========================
# Datasource
# ==========================
quarkus.datasource.devservices.enabled=false
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:decisionmesh}
quarkus.datasource.password=${DB_PASSWORD:decisionmesh}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/decisionmesh}
quarkus.datasource.jdbc.max-size=10

# ==========================
# Flyway
# ==========================
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0
quarkus.flyway.jdbc-url=jdbc:postgresql://localhost:5432/decisionmesh
quarkus.flyway.username=decisionmesh
quarkus.flyway.password=decisionmesh
quarkus.flyway.repair-at-start=true
quarkus.flyway.out-of-order=true

# ==========================
# Hibernate ? Flyway owns schema, not Hibernate
# ==========================
quarkus.hibernate-orm.database.generation=none

# ==========================
# Logging
# ==========================
quarkus.log.category."io.quarkus.oidc".level=INFO
quarkus.log.category."io.vertx.ext.auth".level=INFO

quarkus.log.console.json=false
quarkus.banner.enabled=true