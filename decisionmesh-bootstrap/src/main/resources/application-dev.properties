# =============================================================================
# application.properties ? single file for development
# =============================================================================

# ==========================
# OIDC
# ==========================
quarkus.oidc.enabled=true
quarkus.oidc.application-type=service

# Keycloak realm for this backend service
quarkus.oidc.auth-server-url=http://localhost:8180/realms/decisionmesh

# This is the BACKEND confidential client (not the frontend control-plane-web).
# The frontend (control-plane-web) must have an Audience mapper that adds
# "control-plane-backend" to every access token it issues ? otherwise the
# backend rejects the token with 401 (audience mismatch).
quarkus.oidc.client-id=control-plane-backend
quarkus.oidc.credentials.secret=kKsrU97H21twlzFeuOomgh7bIVdxDWx7

# Token validation
quarkus.oidc.token.issuer=http://localhost:8180/realms/decisionmesh
quarkus.oidc.token.audience=control-plane-web
quarkus.oidc.roles.role-claim-path=realm_access/roles
quarkus.oidc.tls.verification=none
quarkus.oidc.jwks.resolve-early=true

# Tolerate Keycloak slow start ? retries for 30s before failing
quarkus.oidc.connection-delay=30S
quarkus.oidc.connection-retry-count=10

# App-level OIDC issuer reference (used by custom code)
app.oidc.issuer-url=http://localhost:8180/realms/decisionmesh

# ==========================
# Keycloak Admin Client
# Used by backend to call Keycloak Admin REST API (user/tenant management)
# ==========================
keycloak.auth-server-url=http://localhost:8180
keycloak.realm=decisionmesh
keycloak.admin.username=admin
keycloak.admin.password=admin
keycloak.admin.client-id=control-plane-backend
keycloak.admin.client-secret=4TjuKlWs52dnMxySNKLyyNURkVrLMFyB

# ==========================
# HTTP Security ? permission policies evaluated in priority order
# ==========================

# 1 - OPTIONS preflight ? must be permitted before auth checks
quarkus.http.auth.permission.preflight.paths=/*
quarkus.http.auth.permission.preflight.methods=OPTIONS
quarkus.http.auth.permission.preflight.policy=permit
quarkus.http.auth.permission.preflight.priority=1

# 2 - Public endpoints ? health, metrics, signup
quarkus.http.auth.permission.public.paths=/q/*,/health/*,/metrics,/signup,/signup/*
quarkus.http.auth.permission.public.policy=permit
quarkus.http.auth.permission.public.priority=2

# 3 - All API endpoints require authentication
quarkus.http.auth.permission.api.paths=/api/*,/v1/*
quarkus.http.auth.permission.api.policy=authenticated
quarkus.http.auth.permission.api.priority=3

# ==========================
# CORS ? allow frontend dev server
# ==========================
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=Accept,Authorization,Content-Type,X-Requested-With,Idempotency-Key
quarkus.http.cors.exposed-headers=Location,Info
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.cors.access-control-max-age=24H

# ==========================
# Datasource
# ==========================
quarkus.datasource.devservices.enabled=false
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:decisionmesh}
quarkus.datasource.password=${DB_PASSWORD:decisionmesh}

# JDBC ? used by Flyway only
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/decisionmesh}
quarkus.datasource.jdbc.max-size=10
quarkus.datasource.jdbc.additional-jdbc-properties.TimeZone=Asia/Kolkata

# Reactive ? used by Hibernate Reactive (no jdbc: prefix)
quarkus.datasource.reactive.url=${DB_REACTIVE_URL:postgresql://localhost:5432/decisionmesh}

# ==========================
# Flyway ? owns all schema migrations
# ==========================
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0
quarkus.flyway.repair-at-start=true
quarkus.flyway.out-of-order=true

# ==========================
# Hibernate ? Flyway owns DDL, Hibernate must not touch schema
# ==========================
quarkus.hibernate-reactive.database.generation=none

# Fix: prevents Hibernate sharing the REST ObjectMapper for JSONB columns
# which causes data loss warnings when Jackson is customised for REST output.
quarkus.hibernate-orm.mapping.format.global=ignore

quarkus.index-dependency.persistence.group-id=com.decisionmesh
quarkus.index-dependency.persistence.artifact-id=decisionmesh-persistence

quarkus.index-dependency.security.group-id=com.decisionmesh
quarkus.index-dependency.security.artifact-id=decisionmesh-security

