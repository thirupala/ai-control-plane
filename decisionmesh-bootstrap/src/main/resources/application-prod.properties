# ==========================
# OIDC - PROD profile
# ==========================
quarkus.oidc.enabled=true
quarkus.oidc.auth-server-url=https://keycloak.example.com/realms/my-realm-prod
quarkus.oidc.client-id=my-app-backend
quarkus.oidc.credentials.secret=${OIDC_CLIENT_SECRET}

quarkus.oidc.token.issuer=https://keycloak.example.com/realms/my-realm-prod
quarkus.oidc.token.audience=my-app-backend
quarkus.oidc.application-type=service

# Strict TLS in prod
quarkus.oidc.tls.verification=certificate-validation

# Tighten token lifespan validation
quarkus.oidc.token.age=3600
quarkus.oidc.token.refresh-expired=false

# CORS locked to prod domain only
quarkus.http.cors=true
quarkus.http.cors.origins=https://app.example.com
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=Accept,Authorization,Content-Type,X-Requested-With
quarkus.http.cors.exposed-headers=Location,Info
quarkus.http.cors.access-control-max-age=24H
quarkus.http.cors.access-control-allow-credentials=true

# Silent in prod
quarkus.log.category."io.quarkus.oidc".level=WARN