# =============================================================
# decisionmesh-llm — LLM Adapter Configuration
# Add to your root application.properties.
# Secrets should come from env vars (never committed to source).
# =============================================================

# ── OpenAI ────────────────────────────────────────────────────
llm.openai.api-key=${OPENAI_API_KEY}
llm.openai.default-model=gpt-4o
llm.openai.default-timeout-ms=30000

# Cost per 1K tokens in USD — update when OpenAI changes pricing
llm.openai.gpt-4o.input-cost-per-1k=0.005
llm.openai.gpt-4o.output-cost-per-1k=0.015
llm.openai.gpt-4o-mini.input-cost-per-1k=0.00015
llm.openai.gpt-4o-mini.output-cost-per-1k=0.0006

# ── Anthropic ─────────────────────────────────────────────────
llm.anthropic.api-key=${ANTHROPIC_API_KEY}
llm.anthropic.default-model=claude-3-5-sonnet-20241022
llm.anthropic.default-timeout-ms=30000

# Cost per 1K tokens in USD
llm.anthropic.claude-3-5-sonnet.input-cost-per-1k=0.003
llm.anthropic.claude-3-5-sonnet.output-cost-per-1k=0.015
llm.anthropic.claude-3-5-haiku.input-cost-per-1k=0.001
llm.anthropic.claude-3-5-haiku.output-cost-per-1k=0.005
llm.anthropic.claude-3-opus.input-cost-per-1k=0.015
llm.anthropic.claude-3-opus.output-cost-per-1k=0.075

# ── Google Gemini ──────────────────────────────────────────────
llm.gemini.api-key=${GEMINI_API_KEY}
llm.gemini.default-model=gemini-2.0-flash
llm.gemini.default-timeout-ms=30000

# Cost per 1K tokens in USD
llm.gemini.gemini-2-0-flash.input-cost-per-1k=0.00010
llm.gemini.gemini-2-0-flash.output-cost-per-1k=0.00040
llm.gemini.gemini-1-5-pro.input-cost-per-1k=0.00125
llm.gemini.gemini-1-5-pro.output-cost-per-1k=0.00500
llm.gemini.gemini-1-5-flash.input-cost-per-1k=0.000075
llm.gemini.gemini-1-5-flash.output-cost-per-1k=0.000300

# ── DeepSeek ───────────────────────────────────────────────────
llm.deepseek.api-key=${DEEPSEEK_API_KEY}
llm.deepseek.default-model=deepseek-chat
llm.deepseek.default-timeout-ms=60000

# Cost per 1K tokens in USD
llm.deepseek.deepseek-chat.input-cost-per-1k=0.00014
llm.deepseek.deepseek-chat.output-cost-per-1k=0.00028
llm.deepseek.deepseek-reasoner.input-cost-per-1k=0.00055
llm.deepseek.deepseek-reasoner.output-cost-per-1k=0.00219

# ── Azure OpenAI ───────────────────────────────────────────────
llm.azure.api-key=${AZURE_OPENAI_API_KEY}
llm.azure.resource-name=${AZURE_OPENAI_RESOURCE_NAME}
llm.azure.default-deployment=gpt-4o
llm.azure.default-timeout-ms=30000
llm.azure.api-version=2024-12-01-preview

# Cost per 1K tokens in USD (mirrors OpenAI pricing)
llm.azure.gpt-4o.input-cost-per-1k=0.005
llm.azure.gpt-4o.output-cost-per-1k=0.015
llm.azure.gpt-4o-mini.input-cost-per-1k=0.00015
llm.azure.gpt-4o-mini.output-cost-per-1k=0.0006
llm.azure.o1.input-cost-per-1k=0.015
llm.azure.o1.output-cost-per-1k=0.060
llm.azure.o3-mini.input-cost-per-1k=0.0011
llm.azure.o3-mini.output-cost-per-1k=0.0044

# ── Adaptive Selector ─────────────────────────────────────────
# Epsilon: probability of random exploration vs pure exploitation
llm.selector.epsilon=0.10
# During warmup (< this many total calls), epsilon is doubled
llm.selector.warmup-calls=20
# Score multiplier for degraded adapters in ranking
llm.selector.degraded-penalty=0.3

# ── Learning / Stats ──────────────────────────────────────────
# How long to retain adapter performance stats in Redis
llm.learning.stats-ttl-days=7

# ── Fix 3.6: Registry fail-fast ──────────────────────────────
# Set to true in production to hard-fail when no adapters are registered
# rather than silently falling back to plan config
llm.registry.fail-fast-on-empty=false

# ── Fix 3.5: Circuit breaker ──────────────────────────────────
# Minimum executions before degraded adapter is hard-filtered
# (prevents noise from 1-2 failures on new adapters)
llm.selector.circuit-breaker-min-calls=5

# FIX 3.5: min executions before degradation signal is trusted for hard circuit-break
llm.selector.circuit-breaker-threshold=5

# FIX 3.6: set to true to throw on empty adapter registry (default: false = warn + fallback)
llm.selector.strict-mode=false
