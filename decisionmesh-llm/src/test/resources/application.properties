# ── Datasource — DISABLED ─────────────────────────────────────────────────────
quarkus.datasource.jdbc=false
quarkus.datasource.db-kind=postgresql
quarkus.flyway.migrate-at-start=false
quarkus.flyway.enabled=false
quarkus.hibernate-orm.enabled=false

# ── Exclude DB-dependent beans from CDI ──────────────────────────────────────
# The 3 DB classes inject DataSource (unavailable without JDBC).
# LlmExecutionEngine injects all 3 by concrete type, so it must also be excluded.
# ExecutionEngine port is satisfied by TestBeansConfig.executionEngine() producer.
quarkus.arc.exclude-types=\
  com.decisionmesh.infrastructure.llm.persistence.ExecutionRecordRepository,\
  com.decisionmesh.infrastructure.llm.registry.AdapterRegistry,\
  com.decisionmesh.infrastructure.llm.learning.AdapterPerformanceProfileRepository,\
  com.decisionmesh.infrastructure.llm.LlmExecutionEngine

# ── Redis ─────────────────────────────────────────────────────────────────────
quarkus.redis.devservices.enabled=false
quarkus.redis.hosts=redis://localhost:6379

# ── LLM adapter config ────────────────────────────────────────────────────────
llm.openai.api-key=test-key
llm.anthropic.api-key=test-key
llm.gemini.api-key=test-key
llm.deepseek.api-key=test-key
llm.azure.api-key=test-key
llm.azure.resource-name=test-resource

# ── Selector / planner ────────────────────────────────────────────────────────
llm.selector.epsilon=0.10
llm.registry.fail-fast-on-empty=false
planner.epsilon=0.10
planner.fallback-enabled=true
learning.cache.ttl-hours=24
controlplane.lock.intent-ttl-minutes=5
controlplane.lock.max-retries=5
controlplane.lock.initial-backoff-ms=100
controlplane.lock.extend-threshold-ms=60000
