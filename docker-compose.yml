version: '3.8'

services:

  postgres:
    image: postgres:16-alpine
    container_name: decisionmesh-postgres
    environment:
      POSTGRES_DB: decisionmesh
      POSTGRES_USER: decisionmesh
      POSTGRES_PASSWORD: decisionmesh
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - decisionmesh

  redis:
    image: redis:7.2-alpine
    container_name: decisionmesh-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - decisionmesh

  kafka:
    image: redpandadata/redpanda:latest
    container_name: decisionmesh-kafka
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/redpanda/data
    networks:
      - decisionmesh

  keycloak-db:
    image: postgres:15-alpine
    container_name: decisionmesh-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - decisionmesh

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: decisionmesh-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
    ports:
      - "8180:8080"
    volumes:
      - ./infra/keycloak/decisionmesh-realm.json:/opt/keycloak/data/import/decisionmesh-realm.json
    depends_on:
      - keycloak-db
    networks:
      - decisionmesh

  prometheus:
    image: prom/prometheus:latest
    container_name: decisionmesh-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - decisionmesh

  grafana:
    image: grafana/grafana:latest
    container_name: decisionmesh-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - decisionmesh

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  keycloak_db_data:
  prometheus_data:
  grafana_data:

networks:
  decisionmesh:
    driver: bridge